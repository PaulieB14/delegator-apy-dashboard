<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1e1045"/>
      <stop offset="100%" stop-color="#0a0518"/>
    </radialGradient>
    <linearGradient id="g1" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="96" stroke="url(#g1)" stroke-width="3" fill="none" opacity="0.3" filter="url(#outerGlow)"/>
  <g filter="url(#glow)">
    <circle cx="128" cy="68" r="16" fill="url(#g1)"/>
    <path d="M172 94 A60 60 0 1 1 95 182" stroke="url(#g1)" stroke-width="16" stroke-linecap="round" fill="none"/>
    <line x1="172" y1="94" x2="95" y2="182" stroke="url(#g1)" stroke-width="16" stroke-linecap="round"/>
  </g>
</svg>
