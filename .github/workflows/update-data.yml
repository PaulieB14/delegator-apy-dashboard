name: Update Data

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch subgraph data
        env:
          VITE_GRAPH_API_KEY: ${{ secrets.VITE_GRAPH_API_KEY }}
          VITE_SUBGRAPH_ID: ${{ secrets.VITE_SUBGRAPH_ID }}
        run: npx tsx scripts/fetch-data.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --cached --quiet || git commit -m "chore: update data.json $(date -u +%Y-%m-%d)"
          git push
